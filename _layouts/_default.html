<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ page.title | default: site.title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="prose mx-auto p-6">
  <header class="mb-12">
    <h1 class="text-4xl font-bold">{{ site.title }}</h1>
    <p><a href="{{ site.linkedin }}">LinkedIn</a> · <a href="https://github.com/{{ site.github.repository_nwo }}">GitHub</a></p>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="mt-12 text-sm text-gray-500">
    Built with Tailwind, Jekyll and a dash of sass (no CMS required)
  </footer>
</body>
</html>
