---
layout: default
---

<div class="container mx-auto px-6 py-8">
  <a href="{{ '/' | relative_url }}#projects" class="text-white underline hover:text-gray-200 transition-colors mb-6 inline-block">&larr; Back to projects</a>

  <div class="project-content">
    <h1 class="text-4xl font-bold mb-4 gradient-text">{{ page.title }}</h1>
    <p class="italic text-sm mb-6 text-white">{{ page.date | date: "%B %-d, %Y" }}{% if page.tags %} · {{ page.tags | join: ", " }}{% endif %}</p>
    <img src="/assets/images/projects/{{ page.slug }}.png" alt="{{ page.title }}" class="w-full rounded-lg mb-6">
    {{ content }}
  </div>
</div>
